---
name: Security - CodeQL Code Scanning

"on":
  push:
    branches: [main]
    paths: ['**.py', 'pyproject.toml', '.github/**']
  pull_request:
    branches: [main]
    paths: ['**.py', 'pyproject.toml', '.github/**']
  merge_group:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  codeql:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-codeql.yml@66cad82ead0e5d119928c895c7d7da9c837989e5  # v0.52.3
    with:
      languages: python
      build-mode: none
      config-file: .github/codeql/codeql-config.yml
      category: '/language:all'
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5'  # v0.52.3
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      security-events: write
