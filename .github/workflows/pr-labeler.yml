---
name: PR - Auto Label
# Automatically applies labels to pull requests based on changed files.

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@6a96470c698addc35f81b5420e1e4114b35c5a03  # v0.59.1
    with:
      job-name: "🏷️ Auto Label PR"
      configuration-path: .github/labeler.yml
      sync-labels: false
      tooling-ref: '6a96470c698addc35f81b5420e1e4114b35c5a03'  # v0.59.1
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
