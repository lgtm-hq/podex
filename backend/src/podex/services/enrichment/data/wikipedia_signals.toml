# Wikipedia article type-validation signals and category patterns.
# Keys are MediaType string values (study, movie, tv_show, …).

# Used for negative matching; album is not a Podex MediaType.
album_category_patterns = ['\d{4}.*album', 'album.*by', 'studio.*album']

[positive_signals]
study = [
  "study",
  "experiment",
  "research",
  "trial",
  "clinical",
  "medical",
  "scientific",
  "investigation",
  "conducted",
  "participants",
  "subjects",
  "findings",
  "published",
  "journal",
]
movie = [
  "film",
  "movie",
  "directed by",
  "starring",
  "produced by",
  "screenplay",
  "box office",
  "cinema",
  "released",
]
tv_show = [
  "television",
  "tv series",
  "sitcom",
  "episodes",
  "seasons",
  "aired",
  "broadcast",
  "network",
  "showrunner",
]
documentary = ["documentary", "film", "directed", "footage", "narrator"]
book = [
  "novel",
  "book",
  "author",
  "written by",
  "published",
  "literary",
  "chapter",
  "pages",
  "isbn",
]
person = ["born", "died", "is a", "was a", "known for", "career", "biography"]
place = [
  "located",
  "city",
  "town",
  "country",
  "region",
  "population",
  "geography",
  "coordinates",
]
podcast = ["podcast", "hosted by", "episodes", "audio"]

[negative_signals]
study = [
  "album",
  "song",
  "band",
  "singer",
  "musician",
  "film",
  "movie",
  "novel",
  "book",
  "video game",
  "discography",
  "studio album",
  "single",
  "ep",
  "soundtrack",
]
movie = [
  "album",
  "song",
  "novel",
  "book",
  "video game",
  "tv series",
  "television series",
]
tv_show = ["album", "song", "novel", "film", "movie", "video game"]
book = ["album", "song", "film", "movie", "tv series", "video game"]
person = [
  "album",
  "film",
  "novel",
  "song",
  "is a city",
  "is a town",
  "is a country",
]
place = ["is an album", "is a film", "is a novel", "is a song", "born"]

[category_patterns]
study = [
  'medical.*stud',
  'clinical.*trial',
  'experiment',
  'research',
  'health.*scandal',
  'medical.*ethic',
  'scientific.*misconduct',
]
movie = ['\d{4}.*film', 'film.*by', 'english.*film', 'american.*film']
tv_show = [
  'television.*series',
  'tv.*series',
  '\d{4}.*television',
  'american.*television',
]
book = ['\d{4}.*novel', 'book.*by', 'fiction']
person = ['living.*people', '\d{4}.*birth', '\d{4}.*death', 'people.*from']
