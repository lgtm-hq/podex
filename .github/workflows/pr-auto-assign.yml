---
name: PR - Auto Assign
# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  pull_request_target:
    types: [opened, reopened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@6a96470c698addc35f81b5420e1e4114b35c5a03  # v0.59.1
    with:
      job-name: "👤 Auto Assign PR Author"
      codeowners-path: .github/CODEOWNERS
      tooling-ref: '6a96470c698addc35f81b5420e1e4114b35c5a03'  # v0.59.1
      egress-policy: block
      egress-preset: github-tooling
      runner-image: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
