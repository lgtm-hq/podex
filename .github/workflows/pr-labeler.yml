---
name: PR - Auto Label
# Automatically applies labels to pull requests based on changed files.

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@443a687caa93b3afa306a066aae8d8a2b4e60c3c  # v0.59.0
    with:
      job-name: "🏷️ Auto Label PR"
      configuration-path: .github/labeler.yml
      sync-labels: false
      tooling-ref: '443a687caa93b3afa306a066aae8d8a2b4e60c3c'  # v0.59.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
