---
name: PR - Auto Label
# Automatically applies labels to pull requests based on changed files.

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@698a8e882384872913a9b5cf31a38eb240efb549  # v0.57.1
    with:
      job-name: "🏷️ Auto Label PR"
      configuration-path: .github/labeler.yml
      sync-labels: false
      tooling-ref: '698a8e882384872913a9b5cf31a38eb240efb549'  # v0.57.1
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
