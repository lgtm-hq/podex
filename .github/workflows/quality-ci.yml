---
name: Quality - Lint & Format

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: quality-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-quality-lint.yml@4aaefe64763b7841b6d92d94dc47185083d34c9a  # v0.46.0
    permissions:
      contents: read
      packages: read
    with:
      tooling-ref: '4aaefe64763b7841b6d92d94dc47185083d34c9a'  # v0.46.0
      working-directory: backend
      # yamllint disable-line rule:line-length
      lintro-image: ghcr.io/lgtm-hq/py-lintro@sha256:95b9fd9d62c3ca1227447467767ec915e78a7eef62282dd18c0b1c02ee4d3887
      egress-policy: block
      egress-preset: quality

  # Org ruleset (checks-podex): lintro-code-quality / 🛠️ Lintro Code Quality
  lintro-code-quality:
    needs: quality
    if: >-
      always() &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-required-check.yml@4aaefe64763b7841b6d92d94dc47185083d34c9a  # v0.46.0
    permissions:
      contents: read
    with:
      tooling-ref: '4aaefe64763b7841b6d92d94dc47185083d34c9a'  # v0.46.0
      job-name: '🛠️ Lintro Code Quality'
      runner-image: ubuntu-24.04
      upstream-result: ${{ needs.quality.result }}
      status-output: ${{ needs.quality.outputs.status }}
      status-expected: passed
      egress-policy: block
      egress-preset: github-tooling

  publish-quality-summary:
    needs: quality
    if: >-
      !cancelled()
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
      && (
        github.event.pull_request.draft == false
        || github.event.action == 'ready_for_review'
      )
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-quality-summary.yml@4aaefe64763b7841b6d92d94dc47185083d34c9a  # v0.46.0
    permissions:
      contents: read
      pull-requests: write
    with:
      exit-code: ${{ needs.quality.outputs.exit-code }}
      tooling-ref: '4aaefe64763b7841b6d92d94dc47185083d34c9a'  # v0.46.0
      egress-policy: block
      egress-preset: github-tooling
