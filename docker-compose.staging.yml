---
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_staging_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      DEBUG: "false"
      AUTO_MIGRATE: "true"
      SEED_MOCK_DATA: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      API_KEY: ${API_KEY:?set API_KEY}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}
      PUBLIC_SEARCH_RATE_LIMIT_PER_MINUTE: >-
        ${PUBLIC_SEARCH_RATE_LIMIT_PER_MINUTE:-30}
      AUTH_RATE_LIMIT_PER_MINUTE: ${AUTH_RATE_LIMIT_PER_MINUTE:-10}
      OPS_RATE_LIMIT_PER_MINUTE: ${OPS_RATE_LIMIT_PER_MINUTE:-60}
      ADMIN_RATE_LIMIT_PER_MINUTE: ${ADMIN_RATE_LIMIT_PER_MINUTE:-30}
      MEILISEARCH_ENABLED: ${MEILISEARCH_ENABLED:-true}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:?set PUBLIC_API_URL}
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:?set PUBLIC_API_URL}
      HOST: 0.0.0.0
      PORT: 4321
    ports:
      - "${FRONTEND_PORT:-4321}:4321"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:4321').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_staging_data:
  meilisearch_staging_data:
