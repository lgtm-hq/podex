---
name: PR - Auto Assign
# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  pull_request_target:
    types: [opened, reopened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@698a8e882384872913a9b5cf31a38eb240efb549  # v0.57.1
    with:
      job-name: "👤 Auto Assign PR Author"
      codeowners-path: .github/CODEOWNERS
      tooling-ref: '698a8e882384872913a9b5cf31a38eb240efb549'  # v0.57.1
      egress-policy: block
      egress-preset: github-tooling
      runner-image: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
