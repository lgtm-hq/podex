---
name: CI - Tests

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: test-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-python.yml@cecca744299be6a34f3b4ea4f18c00262081ab61  # v0.41.0
    with:
      python-versions: '3.11,3.12,3.13'
      working-directory: backend
      test-path: tests
      coverage: true
      coverage-format: auto
      coverage-threshold: 85
      upload-coverage: true
      draft-pr-skip: true
      job-name: Python Compatibility
      runner-image: ubuntu-24.04
      tooling-ref: 'cecca744299be6a34f3b4ea4f18c00262081ab61'  # v0.41.0
      egress-policy: block
      egress-preset: quality
    permissions:
      actions: write
      contents: read
      pull-requests: write
