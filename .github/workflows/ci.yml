---
name: CI

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    permissions:
      contents: read
      packages: read
      pull-requests: write
    # Keep the uses entry and tooling-ref parameter on the same commit SHA.
    # GitHub Actions cannot parameterize uses, so update both places together.
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-quality.yml@fc73b3ab8342a24597c12d137d6ff7fca84b9fe2
    with:
      tooling-ref: "fc73b3ab8342a24597c12d137d6ff7fca84b9fe2"
