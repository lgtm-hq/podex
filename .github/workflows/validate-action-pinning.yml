---
name: Quality Check - Action Pinning Validation

"on":
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-action-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@6a96470c698addc35f81b5420e1e4114b35c5a03  # v0.59.1
    with:
      tooling-ref: '6a96470c698addc35f81b5420e1e4114b35c5a03'  # v0.59.1
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
