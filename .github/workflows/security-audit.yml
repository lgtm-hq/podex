---
name: Security - OSV Audit

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  push:
    branches: [main]
  schedule:
    # Weekly on Monday at 05:30 UTC
    - cron: '30 5 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Org ruleset (checks-podex): security-audit / 🔐 Security Audit
  security-audit:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-security-audit.yml@6a96470c698addc35f81b5420e1e4114b35c5a03  # v0.59.1
    with:
      tooling-ref: '6a96470c698addc35f81b5420e1e4114b35c5a03'  # v0.59.1
      job-name: '🔐 Security Audit'
      # yamllint disable-line rule:line-length
      lintro-image: ghcr.io/lgtm-hq/py-lintro@sha256:95b9fd9d62c3ca1227447467767ec915e78a7eef62282dd18c0b1c02ee4d3887
      runner-image: ubuntu-24.04
      upload-comment-artifact: ${{ github.event_name == 'pull_request' }}
      egress-policy: block
      egress-preset: quality
    permissions:
      # read: checkout lockfiles and manifests for OSV scanning
      contents: read
      # read: pull the py-lintro image from ghcr.io
      packages: read

  publish-security-audit-comment:
    needs: security-audit
    if: >-
      !cancelled()
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
      && (
        github.event.pull_request.draft == false
        || github.event.action == 'ready_for_review'
      )
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-security-audit-comment.yml@6a96470c698addc35f81b5420e1e4114b35c5a03  # v0.59.1
    with:
      tooling-ref: '6a96470c698addc35f81b5420e1e4114b35c5a03'  # v0.59.1
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      # read: checkout repository for comment generation
      contents: read
      # write: post OSV audit summary on the PR
      pull-requests: write
