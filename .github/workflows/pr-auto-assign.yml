---
name: PR - Auto Assign
# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  pull_request_target:
    types: [opened, reopened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@ee8484ca71db3a2c2c33da6128bbf2330fcd7c88  # v0.59.2
    with:
      job-name: "👤 Auto Assign PR Author"
      codeowners-path: .github/CODEOWNERS
      tooling-ref: 'ee8484ca71db3a2c2c33da6128bbf2330fcd7c88'  # v0.59.2
      egress-policy: block
      egress-preset: github-tooling
      runner-image: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
