---
name: Release - Version PR

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-version-pr-${{ github.repository }}
  cancel-in-progress: false

jobs:
  version-pr:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-version-pr.yml@4aaefe64763b7841b6d92d94dc47185083d34c9a  # v0.46.0
    with:
      ecosystems: python
      # yamllint disable-line rule:line-length
      ecosystem-config: '{"python":{"pyproject":"backend/pyproject.toml","init":"backend/src/podex/__init__.py"}}'
      auto-merge: true
      # Allow MAJOR bumps so the version file stays aligned with auto-tag.
      max-bump: major
      # Patch releases auto-merge; minor/major need explicit review.
      auto-merge-patch-only: true
      tooling-ref: '4aaefe64763b7841b6d92d94dc47185083d34c9a'  # v0.46.0
      egress-policy: block
      egress-preset: pypi
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
