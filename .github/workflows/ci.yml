---
name: CI

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    permissions:
      contents: read
      packages: read
      pull-requests: write
    # Keep the uses entry and tooling-ref parameter on the same commit SHA.
    # GitHub Actions cannot parameterize uses, so update both places together.
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-quality-lint.yml@96a42109637efd4c019d176e0902e3be23295716  # v0.45.1
    with:
      tooling-ref: "96a42109637efd4c019d176e0902e3be23295716"  # v0.45.1
