---
name: Quality Check - Action Pinning Validation

"on":
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-action-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@698a8e882384872913a9b5cf31a38eb240efb549  # v0.57.1
    with:
      tooling-ref: '698a8e882384872913a9b5cf31a38eb240efb549'  # v0.57.1
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
