---
name: PR - Auto Label
# Automatically applies labels to pull requests based on changed files.

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@ee8484ca71db3a2c2c33da6128bbf2330fcd7c88  # v0.59.2
    with:
      job-name: "🏷️ Auto Label PR"
      configuration-path: .github/labeler.yml
      sync-labels: false
      tooling-ref: 'ee8484ca71db3a2c2c33da6128bbf2330fcd7c88'  # v0.59.2
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
