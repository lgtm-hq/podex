---
name: CI - Tests

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: test-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Compat mode (lgtm-ci contract #340): multi-runtime matrix must not
  # collect coverage or publish PR summaries.
  # Org ruleset (checks-podex): test / Aggregate Python Results
  test:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-python.yml@e3a404117355194de72f09a3c8a1dc341bc9cabb  # v0.55.0
    with:
      python-versions: '3.11,3.12,3.13'
      working-directory: backend
      test-path: tests
      coverage: false
      publish-test-summary: false
      draft-pr-skip: true
      job-name: '🧪 Python Compatibility'
      runner-image: ubuntu-24.04
      tooling-ref: 'e3a404117355194de72f09a3c8a1dc341bc9cabb'  # v0.55.0
      egress-policy: block
      egress-preset: quality
    permissions:
      # multi-version matrix requires actions:write for artifact aggregation
      actions: write
      contents: read
      pull-requests: write

  # Coverage mode (lgtm-ci contract #340): single runtime with coverage
  # reporting and the PR test summary comment.
  test-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-python.yml@e3a404117355194de72f09a3c8a1dc341bc9cabb  # v0.55.0
    with:
      python-version: '3.13'
      working-directory: backend
      test-path: tests
      coverage: true
      coverage-format: json
      coverage-threshold: 85
      upload-coverage: true
      publish-test-summary: true
      draft-pr-skip: true
      job-name: '🧪 Python Coverage'
      runner-image: ubuntu-24.04
      tooling-ref: 'e3a404117355194de72f09a3c8a1dc341bc9cabb'  # v0.55.0
      egress-policy: block
      egress-preset: quality
    permissions:
      actions: write
      contents: read
      pull-requests: write
