---
name: Security - CodeQL Code Scanning

"on":
  push:
    branches: [main]
    paths: ['**.py', 'pyproject.toml', '.github/**']
  pull_request:
    branches: [main]
    paths: ['**.py', 'pyproject.toml', '.github/**']
  merge_group:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  codeql:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-codeql.yml@443a687caa93b3afa306a066aae8d8a2b4e60c3c  # v0.59.0
    with:
      languages: python
      build-mode: none
      config-file: .github/codeql/codeql-config.yml
      category: '/language:all'
      tooling-ref: '443a687caa93b3afa306a066aae8d8a2b4e60c3c'  # v0.59.0
      egress-policy: block
      egress-preset: github-tooling
      # CodeQL bundle downloads redirect to
      # release-assets.githubusercontent.com, which the github-tooling preset
      # lacks. The reusable's setup job hardens with this raw input before
      # the allowlist resolver runs, and since lgtm-ci v0.50.0 a caller
      # allowed-endpoints REPLACES the baseline, so the complete endpoint
      # list must be passed (reusable input default plus the release-assets
      # host) rather than a single appended host (lgtm-hq/lgtm-ci#517).
      allowed-endpoints: >-
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        uploads.github.com:443
        pipelines.actions.githubusercontent.com:443
        release-assets.githubusercontent.com:443
    permissions:
      contents: read
      security-events: write
