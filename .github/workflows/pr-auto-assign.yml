---
name: PR - Auto Assign
# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  pull_request_target:
    types: [opened, reopened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@0b8069a00cbda26514e00b8a551bad8e754d38d7  # v0.58.0
    with:
      job-name: "👤 Auto Assign PR Author"
      codeowners-path: .github/CODEOWNERS
      tooling-ref: '0b8069a00cbda26514e00b8a551bad8e754d38d7'  # v0.58.0
      egress-policy: block
      egress-preset: github-tooling
      runner-image: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
