---
services:
  db:
    image: postgres:16-alpine
    container_name: podex-db
    environment:
      POSTGRES_USER: podex
      POSTGRES_PASSWORD: podex
      POSTGRES_DB: podex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podex -d podex"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: podex-meilisearch
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-podex_dev_key}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: podex-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://podex:podex@db:5432/podex
      - DEBUG=false
      # CORS: Set to your production domain(s) in production
      # Example for production: CORS_ORIGINS=["https://podex.example.com"]
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:4321","http://localhost:3000"]}
      # API Key: Set to enable authentication (leave empty to disable)
      - API_KEY=${API_KEY:-}
      # Rate limiting: requests per minute per IP
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-100}
    volumes:
      - ./data:/app/data
      - backend-data:/app/backend-data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - PUBLIC_API_URL=http://localhost:8000/api/v1
    container_name: podex-frontend
    ports:
      - "4321:4321"
    environment:
      - PUBLIC_API_URL=http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  backend-data:
  meilisearch_data:
