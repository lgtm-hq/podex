---
name: Security - Vulnerability Suppression Check
# Weekly check for stale or expired vulnerability suppressions in
# .osv-scanner.toml. Opens a cleanup PR when suppressions are no longer
# needed.

"on":
  schedule:
    # Weekly on Monday at 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: vuln-suppression-check-${{ github.repository }}
  cancel-in-progress: false

jobs:
  check-suppressions:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-vuln-suppression-check.yml@0b8069a00cbda26514e00b8a551bad8e754d38d7  # v0.58.0
    with:
      job-name: '🔍 Check Vulnerability Suppressions'
      tooling-ref: '0b8069a00cbda26514e00b8a551bad8e754d38d7'  # v0.58.0
      workflow-file: vuln-suppression-check.yml
      runner-image: ubuntu-24.04
      egress-policy: block
      egress-preset: osv-scanner
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      # write: create cleanup branches and commits when suppressions expire
      contents: write
      # write: open cleanup pull requests
      pull-requests: write
