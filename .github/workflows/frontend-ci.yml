---
name: CI - Frontend

"on":
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  frontend:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-node-custom.yml@e3a404117355194de72f09a3c8a1dc341bc9cabb  # v0.55.0
    with:
      package-manager: bun
      working-directory: frontend
      # astro check then vitest with coverage (threshold in vitest.config.ts);
      # the && short-circuits so a check failure also fails the job.
      test-command: 'bun run check && bun run test:coverage'
      coverage: true
      job-name: Frontend Checks
      node-version: '22'
      draft-pr-skip: true
      tooling-ref: 'e3a404117355194de72f09a3c8a1dc341bc9cabb'  # v0.55.0
      # audit (not block) for now: no ready egress preset covers the node/bun
      # install registries. Tighten to block with an explicit allowlist later.
      egress-policy: audit
    permissions:
      actions: write
      contents: read
      pull-requests: write
