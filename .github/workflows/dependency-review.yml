---
name: Security - Dependency Review

"on":
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-dependency-review.yml@e3a404117355194de72f09a3c8a1dc341bc9cabb  # v0.55.0
    with:
      fail-on-severity: high
      tooling-ref: 'e3a404117355194de72f09a3c8a1dc341bc9cabb'  # v0.55.0
      egress-policy: block
      egress-preset: scorecard
      # replace (not append): the reusable's first harden-runner step applies
      # allowed-endpoints verbatim before presets resolve, so a partial append
      # list blocks github.com at checkout. Full scorecard preset expansion
      # plus project extras, mirroring lgtm-ci's own caller at v0.52.3.
      allowed-endpoints-mode: replace
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        gcr.io:443
        api.osv.dev:443
        api.scorecard.dev:443
        api.securityscorecards.dev:443
        api.deps.dev:443
        release-assets.githubusercontent.com:443
    permissions:
      contents: read
      pull-requests: read
