---
name: Security - SBOM Generation
# Generate an SBOM for the podex monorepo on main and on-demand.
# Syft directory scan at repo root covers both backend (uv.lock,
# pyproject.toml) and frontend (bun.lock, package.json) ecosystems.

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sbom:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@ee8484ca71db3a2c2c33da6128bbf2330fcd7c88  # v0.59.2
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      tooling-ref: 'ee8484ca71db3a2c2c33da6128bbf2330fcd7c88'  # v0.59.2
      egress-policy: block
      egress-preset: sbom
    permissions:
      # write: reusable-sbom declares if-gated release-asset jobs with
      # contents: write; GitHub validates every called job's permissions at
      # startup regardless of if-conditions, so the caller must grant write
      # even though report mode only reads (matches turbo-themes caller).
      contents: write
      # write: upload Grype SARIF findings when upload-sarif is enabled
      security-events: write
      # write: OIDC token for SBOM attestation signing (create-attestation)
      id-token: write
      # write: publish SBOM build attestations
      attestations: write
