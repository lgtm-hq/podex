---
name: CI - Tests

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: test-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Compat mode (lgtm-ci contract #340): multi-runtime matrix must not
  # collect coverage or publish PR summaries.
  # Org ruleset (checks-podex): test / Aggregate Python Results
  test:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-python.yml@443a687caa93b3afa306a066aae8d8a2b4e60c3c  # v0.59.0
    with:
      python-versions: '3.11,3.12,3.13,3.14'
      working-directory: backend
      test-path: tests
      coverage: false
      publish-test-summary: false
      draft-pr-skip: true
      job-name: '🧪 Python Compatibility'
      runner-image: ubuntu-24.04
      tooling-ref: '443a687caa93b3afa306a066aae8d8a2b4e60c3c'  # v0.59.0
      egress-policy: block
      egress-preset: quality
    permissions:
      # multi-version matrix requires actions:write for artifact aggregation
      actions: write
      contents: read
      pull-requests: write

  # Coverage publishing (#200 / epic #114): no separate coverage.yml calling
  # reusable-coverage.yml. test-coverage already collects coverage, enforces the
  # 85% threshold, uploads artifacts, and publishes the PR summary via
  # reusable-test-python. reusable-coverage would only add multi-artifact merge,
  # badge generation, and optional GitHub Pages — not needed for this repo.
  #
  # Coverage mode (lgtm-ci contract #340): single runtime with coverage
  # reporting and the PR test summary comment.
  test-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-python.yml@443a687caa93b3afa306a066aae8d8a2b4e60c3c  # v0.59.0
    with:
      python-version: '3.13'
      working-directory: backend
      test-path: tests
      coverage: true
      coverage-format: json
      coverage-threshold: 85
      upload-coverage: true
      publish-test-summary: true
      draft-pr-skip: true
      job-name: '🧪 Python Coverage'
      runner-image: ubuntu-24.04
      tooling-ref: '443a687caa93b3afa306a066aae8d8a2b4e60c3c'  # v0.59.0
      egress-policy: block
      egress-preset: quality
    permissions:
      actions: write
      contents: read
      pull-requests: write
