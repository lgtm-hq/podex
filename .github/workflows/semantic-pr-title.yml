---
name: PR - Title Validation
# Validates PR titles follow Conventional Commits format.

"on":
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Org ruleset (checks-podex): semantic-title / 📝 Validate PR Title
  semantic-title:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@e3a404117355194de72f09a3c8a1dc341bc9cabb  # v0.55.0
    with:
      job-name: "📝 Validate PR Title"
      tooling-ref: 'e3a404117355194de72f09a3c8a1dc341bc9cabb'  # v0.55.0
      egress-policy: block
      egress-preset: github-tooling
      comment-marker: "<!-- semantic-pr-title -->"
    permissions:
      contents: read
      pull-requests: write
