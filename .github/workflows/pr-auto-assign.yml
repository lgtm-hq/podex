---
name: PR - Auto Assign
# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  pull_request_target:
    types: [opened, reopened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@443a687caa93b3afa306a066aae8d8a2b4e60c3c  # v0.59.0
    with:
      job-name: "👤 Auto Assign PR Author"
      codeowners-path: .github/CODEOWNERS
      tooling-ref: '443a687caa93b3afa306a066aae8d8a2b4e60c3c'  # v0.59.0
      egress-policy: block
      egress-preset: github-tooling
      runner-image: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
