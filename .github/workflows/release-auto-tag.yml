---
name: Release - Auto Tag

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-auto-tag-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-tag:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-auto-tag.yml@0b8069a00cbda26514e00b8a551bad8e754d38d7  # v0.58.0
    with:
      # Default version-source (commit) reads the version from the merged
      # `chore(release): version X.Y.Z` commit — language-agnostic, so no
      # version-source/version-file needed for the backend/ monorepo layout.
      # Podex ships GitHub Releases (Docker images to GHCR on tag), not PyPI.
      create-release: true
      tooling-ref: '0b8069a00cbda26514e00b8a551bad8e754d38d7'  # v0.58.0
      egress-policy: block
      egress-preset: github-tooling
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      actions: read
      contents: write
      issues: write
